name: "Build and Release"
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies
        run: npm ci

      - name: prepare ffmpeg sidecar
        shell: pwsh
        run: |
          $repoRoot = Get-Location
          $binDir = Join-Path $repoRoot "src-tauri/bin"
          if (!(Test-Path $binDir)) { New-Item -Path $binDir -ItemType Directory -Force }
          $url = "https://github.com/GyanD/codexffmpeg/releases/download/2022-12-04-git-6c814093d8/ffmpeg-2022-12-04-git-6c814093d8-essentials_build.zip"
          curl.exe -L $url -o ffmpeg.zip
          tar.exe -xf ffmpeg.zip
          $ffmpegExe = Get-ChildItem -Path "ffmpeg-*" -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          $destFile = Join-Path $binDir "ffmpeg-x86_64-pc-windows-msvc.exe"
          Copy-Item $ffmpegExe.FullName -Destination $destFile -Force

      - name: build tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "CutShon ${{ github.ref_name }}"
          releaseBody: "Download the Windows installer below."
          releaseDraft: false
          prerelease: false

  build-android:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: setup java
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: setup android sdk
        uses: android-actions/setup-android@v3

      - name: install dependencies
        run: npm ci

      - name: sync capacitor android
        run: npx cap sync android

      - name: build android apk
        run: |
          cd android
          chmod +x gradlew
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          ./gradlew assembleDebug

      - name: upload apk to release
        uses: softprops/action-gh-release@v1
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

