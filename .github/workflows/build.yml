name: \"Build and Release\"
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies
        run: npm install

      - name: prepare ffmpeg sidecar
        shell: pwsh
        run: |
          $binDir = 'src-tauri/bin'
          if (!(Test-Path $binDir)) { New-Item -Path $binDir -ItemType Directory -Force }
          $url = 'https://github.com/GyanD/codexffmpeg/releases/download/2022-12-04-git-6c814093d8/ffmpeg-2022-12-04-git-6c814093d8-essentials_build.zip'
          Write-Host 'Downloading FFmpeg...'
          curl.exe -L $url -o ffmpeg.zip
          
          Write-Host 'Extracting FFmpeg...'
          tar.exe -xf ffmpeg.zip
          
          Write-Host 'Locating ffmpeg.exe...'
          $ffmpegExe = Get-ChildItem -Path 'ffmpeg-*' -Recurse -Filter 'ffmpeg.exe' | Select-Object -First 1
          if ($null -eq $ffmpegExe) { throw 'ffmpeg.exe not found' }
          
          Write-Host \"Copying to: $binDir\"
          Copy-Item $ffmpegExe.FullName -Destination \"$binDir/ffmpeg-x86_64-pc-windows-msvc.exe\" -Force
          Write-Host 'FFmpeg sidecar ready!'

      - name: build tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'CutShon ${{ github.ref_name }}'
          releaseBody: 'Download the Windows installer below.'
          releaseDraft: false
          prerelease: false
